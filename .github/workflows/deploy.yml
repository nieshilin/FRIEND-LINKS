name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EdgeOne Pages
        run: |
          curl -X POST "https://api.edgeone.ai/v1/deployments" \
            -H "Authorization: Bearer ${{ secrets.EDGEONE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "branch": "main",
              "repo": "nieshilin/FRIEND-LINKS"
            }'
