<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>友链交换站</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
/* ══════════════════════════════
   TOKENS
══════════════════════════════ */
:root{
  --bg:       #070810;
  --surface:  #0d0e1a;
  --surface2: #13141f;
  --surface3: #1a1b28;
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(255,255,255,.13);
  --text:     #e8eaf0;
  --sub:      #9399a8;
  --muted:    #555b6e;
  --accent:   #7c6cf7;
  --accent2:  #a89af9;
  --glow:     rgba(124,108,247,.22);
  --r:        16px;
  --rs:       10px;
  --ease:     cubic-bezier(.16,1,.3,1);
}
[data-theme=light]{
  --bg:       #f2f3f8;
  --surface:  #ffffff;
  --surface2: #f7f8fc;
  --surface3: #eef0f7;
  --border:   rgba(0,0,0,.07);
  --border2:  rgba(0,0,0,.13);
  --text:     #0e0f1a;
  --sub:      #6b7280;
  --muted:    #9ca3af;
  --accent:   #6457e8;
  --accent2:  #8b7cf4;
  --glow:     rgba(100,87,232,.18);
}

/* ══════════════════════════════
   BASE
══════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .35s,color .35s;
  -webkit-font-smoothing:antialiased;
}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{display:block}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ══════════════════════════════
   NOISE
══════════════════════════════ */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;opacity:.025;
}

/* ══════════════════════════════
   AURORA
══════════════════════════════ */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(110px)}
.orb-1{width:800px;height:600px;top:-180px;left:-200px;
  background:radial-gradient(circle,rgba(124,108,247,.13),transparent 65%);
  animation:f1 24s ease-in-out infinite alternate}
.orb-2{width:500px;height:500px;top:30%;right:-100px;
  background:radial-gradient(circle,rgba(167,139,250,.09),transparent 65%);
  animation:f2 20s ease-in-out infinite alternate}
.orb-3{width:450px;height:450px;bottom:-80px;left:35%;
  background:radial-gradient(circle,rgba(79,70,229,.1),transparent 65%);
  animation:f3 28s ease-in-out infinite alternate}
@keyframes f1{to{transform:translate(80px,60px) scale(1.08)}}
@keyframes f2{to{transform:translate(-60px,40px) scale(1.12)}}
@keyframes f3{to{transform:translate(40px,-50px) scale(1.06)}}
[data-theme=light] .orb-1{background:radial-gradient(circle,rgba(100,87,232,.07),transparent 65%)}
[data-theme=light] .orb-2{background:radial-gradient(circle,rgba(139,124,244,.05),transparent 65%)}
[data-theme=light] .orb-3{background:radial-gradient(circle,rgba(79,70,229,.06),transparent 65%)}

/* ══════════════════════════════
   WRAPPER
══════════════════════════════ */
.wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 24px 100px}

/* ══════════════════════════════
   NAV
══════════════════════════════ */
.nav{display:flex;align-items:center;justify-content:space-between;padding:22px 0;gap:12px}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:.95rem;letter-spacing:-.01em}
.nav-logo-pulse{
  width:9px;height:9px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 10px var(--glow);
  animation:p 2.5s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.75);opacity:.55}}
.nav-acts{display:flex;gap:8px}
.nav-btn{
  display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:var(--rs);
  border:1px solid var(--border);background:var(--surface);
  color:var(--sub);transition:all .2s var(--ease)}
.nav-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}
.nav-btn svg{width:17px;height:17px}

/* ══════════════════════════════
   HERO
══════════════════════════════ */
.hero{text-align:center;padding:72px 0 60px}
.hero-tag{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 14px;border-radius:50px;
  border:1px solid rgba(124,108,247,.28);
  background:rgba(124,108,247,.07);
  color:var(--accent2);font-size:.73rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:22px}
.hero-tag-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}

.hero h1{
  font-size:clamp(2.2rem,5.5vw,3.8rem);font-weight:800;
  letter-spacing:-.04em;line-height:1.1;margin-bottom:16px;
  background:linear-gradient(140deg,var(--text) 0%,var(--accent2) 55%,rgba(167,139,250,.65) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{
  font-size:1rem;color:var(--sub);line-height:1.75;
  max-width:440px;margin:0 auto 40px}

/* stats strip */
.stats{
  display:inline-flex;border:1px solid var(--border);
  border-radius:var(--r);background:var(--surface);overflow:hidden}
.stat{padding:14px 30px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-num{
  font-size:1.55rem;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,var(--text),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:.7rem;color:var(--muted);font-weight:500;letter-spacing:.04em;margin-top:3px}

/* ══════════════════════════════
   SEARCH + FILTER
══════════════════════════════ */
.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:28px}
.search-box{
  flex:1;min-width:220px;position:relative}
.search-box svg{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--muted);width:15px;height:15px;pointer-events:none}
#search{
  width:100%;height:44px;padding:0 14px 0 38px;
  border-radius:var(--rs);border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:.88rem;
  font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
#search::placeholder{color:var(--muted)}

/* category tabs */
.cats{display:flex;gap:8px;flex-wrap:wrap}
.cat-btn{
  display:inline-flex;align-items:center;gap:6px;
  height:36px;padding:0 14px;border-radius:50px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--sub);font-size:.8rem;font-weight:500;
  transition:all .2s var(--ease);white-space:nowrap}
.cat-btn:hover{border-color:var(--border2);color:var(--text)}
.cat-btn.active{
  background:var(--accent);border-color:var(--accent);
  color:#fff;box-shadow:0 4px 16px var(--glow)}
.cat-icon{font-size:.85rem}

/* ══════════════════════════════
   COUNT
══════════════════════════════ */
.count-bar{margin-bottom:20px;font-size:.8rem;color:var(--muted)}
.count-bar strong{color:var(--text);font-weight:600}

/* ══════════════════════════════
   GRID
══════════════════════════════ */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}

/* ══════════════════════════════
   CARD
══════════════════════════════ */
.card{
  border-radius:var(--r);border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  transition:transform .3s var(--ease),box-shadow .3s var(--ease),border-color .3s;
  position:relative;overflow:hidden;
  animation:ci .4s var(--ease) both}
@keyframes ci{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.card::before{
  content:'';position:absolute;inset:0;
  background:var(--card-grad,linear-gradient(135deg,rgba(124,108,247,.05),transparent 55%));
  opacity:0;transition:opacity .3s;pointer-events:none;border-radius:var(--r)}
.card:hover{transform:translateY(-4px);border-color:var(--border2);
  box-shadow:0 18px 50px rgba(0,0,0,.28),0 0 0 1px var(--border2)}
.card:hover::before{opacity:1}

.card-accent{height:2px;background:linear-gradient(90deg,var(--card-color,#7c6cf7) 0%,transparent 80%)}

.card-inner{padding:18px 20px 16px;display:flex;gap:13px;align-items:flex-start}

.avatar{
  flex-shrink:0;width:46px;height:46px;border-radius:12px;
  border:1px solid var(--border);background:var(--surface2);
  overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.25rem;
  position:relative}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-ring{
  position:absolute;inset:-2px;border-radius:14px;z-index:-1;
  background:linear-gradient(135deg,var(--card-color,#7c6cf7),transparent);
  opacity:0;transition:opacity .3s}
.card:hover .avatar-ring{opacity:1}

.info{flex:1;min-width:0}
.info-name{
  font-size:.93rem;font-weight:600;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-arrow{
  opacity:0;transform:translate(-3px,3px);
  transition:all .2s var(--ease);flex-shrink:0;color:var(--accent)}
.card:hover .info-arrow{opacity:1;transform:none}
.info-url{font-size:.74rem;color:var(--muted);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-desc{
  font-size:.82rem;color:var(--sub);margin-top:9px;line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.card-foot{
  padding:10px 20px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cat-tag{
  font-size:.71rem;font-weight:500;padding:3px 9px;
  border-radius:50px;border:1px solid var(--border);
  background:var(--surface2);color:var(--sub)}

/* ══════════════════════════════
   EMPTY / ERROR
══════════════════════════════ */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}

/* ══════════════════════════════
   SKELETON
══════════════════════════════ */
.sk-wrap{border-radius:var(--r);border:1px solid var(--border);background:var(--surface);padding:18px 20px}
.sk{border-radius:5px;background:var(--surface3);animation:sk 1.6s ease-in-out infinite}
@keyframes sk{0%,100%{opacity:.45}50%{opacity:.9}}

/* ══════════════════════════════
   DETAIL MODAL
══════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.65);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;
  transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}

.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:24px;width:100%;max-width:480px;
  box-shadow:0 40px 100px rgba(0,0,0,.55);
  transform:scale(.93) translateY(14px);
  transition:transform .35s var(--ease);
  overflow:hidden;position:relative}
.overlay.open .modal{transform:none}

/* ── Banner ── */
.modal-banner{
  height:130px;position:relative;overflow:hidden;
  /* default; overridden inline */
  background:linear-gradient(135deg,#7c6cf7 0%,#a89af9 100%);
  background-size:cover;background-position:center;
}
/* soft vignette to blend into body */
.modal-banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.08) 0%,rgba(0,0,0,.38) 100%);
  pointer-events:none}
/* banner 里的图片，填满 */
.modal-banner-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center;
}
/* avatar + link row — sits at the top of modal-body */
.modal-avatar-row{
  display:flex;align-items:center;gap:12px;
  padding:0 4px;margin-bottom:10px;
  justify-content:center;
}
.modal-avatar-thumb{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  border:2px solid rgba(255,255,255,.6);
  box-shadow:0 2px 12px rgba(0,0,0,.25);
  background:var(--surface2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem}
.modal-avatar-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.modal-avatar-link-wrap{
  flex:1;min-width:0;
  display:flex;align-items:center;gap:6px}
.modal-avatar-link-label{
  font-size:.7rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.modal-avatar-link{
  font-size:.73rem;color:var(--sub);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:3px 8px;max-width:220px;
  display:block}
/* avatar sits centred inside banner, always fully visible */
.modal-avatar{
  position:absolute;left:50%;bottom:18px;
  transform:translateX(-50%);z-index:2;
  width:72px;height:72px;border-radius:18px;
  border:3px solid rgba(255,255,255,.85);
  box-shadow:0 4px 20px rgba(0,0,0,.35);
  background:var(--surface2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;flex-shrink:0}
.modal-avatar img{width:100%;height:100%;object-fit:cover;display:block}

.modal-close{
  position:absolute;top:12px;right:12px;z-index:10;
  width:30px;height:30px;border-radius:8px;
  background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.18);
  color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.modal-close:hover{background:rgba(0,0,0,.55)}
.modal-close svg{width:14px;height:14px}

/* ── Body ── */
.modal-body{padding:20px 24px 24px;text-align:center}
.modal-name{font-size:1.2rem;font-weight:700;letter-spacing:-.02em;margin-bottom:5px}
.modal-url{
  font-size:.78rem;color:var(--muted);margin-bottom:16px;
  word-break:break-all;display:inline-flex;align-items:center;gap:4px}
.modal-url-icon{opacity:.5}
.modal-desc{
  font-size:.87rem;color:var(--sub);line-height:1.75;
  padding:13px 16px;border-radius:var(--rs);text-align:left;
  background:var(--surface2);border:1px solid var(--border);margin-bottom:14px}
.modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;justify-content:center}
.modal-cat{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:50px;
  border:1px solid var(--border);background:var(--surface2);
  font-size:.78rem;font-weight:500;color:var(--sub)}

.modal-actions{display:flex;gap:10px}
.mba{
  flex:1;height:43px;border-radius:var(--rs);font-size:.85rem;
  font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s var(--ease);cursor:pointer;border:none;font-family:inherit}
.mba-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;box-shadow:0 4px 16px var(--glow)}
.mba-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--glow)}
.mba-ghost{
  background:var(--surface2);border:1px solid var(--border);color:var(--sub)}
.mba-ghost:hover{border-color:var(--border2);color:var(--text)}
.mba svg{width:15px;height:15px}

/* copy-avatar button */
.modal-copy-avatar{
  flex-shrink:0;width:28px;height:28px;
  border-radius:7px;border:1px solid var(--border);
  background:var(--surface2);color:var(--sub);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s var(--ease)}
.modal-copy-avatar:hover{border-color:var(--border2);color:var(--accent);background:var(--surface3)}

/* ══════════════════════════════
   CTA
══════════════════════════════ */
.cta{
  margin-top:48px;border-radius:var(--r);border:1px solid var(--border);
  background:var(--surface);padding:44px 40px;text-align:center;
  position:relative;overflow:hidden}
.cta::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -10%,rgba(124,108,247,.09),transparent 60%);
  pointer-events:none}
.cta-inner{position:relative;z-index:1}
.cta h2{font-size:1.45rem;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
.cta-sub{
  color:var(--sub);font-size:.9rem;line-height:1.75;margin-bottom:22px}
.cta-sub a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}

.btn{
  display:inline-flex;align-items:center;gap:8px;height:44px;
  padding:0 22px;border-radius:var(--rs);font-size:.87rem;font-weight:600;
  transition:all .25s var(--ease);cursor:pointer;font-family:inherit;border:none}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;box-shadow:0 6px 20px var(--glow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px var(--glow)}
.btn-primary svg{width:16px;height:16px}

/* ══════════════════════════════
   FOOTER
══════════════════════════════ */
footer{
  text-align:center;padding:28px 0 0;margin-top:56px;
  border-top:1px solid var(--border);
  font-size:.78rem;color:var(--muted)}
footer a{color:var(--accent)}footer a:hover{opacity:.7}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media(max-width:640px){
  .hero{padding:52px 0 44px}
  .stats{flex-direction:column;width:100%}
  .stat{border-right:none;border-bottom:1px solid var(--border)}
  .stat:last-child{border-bottom:none}
  #grid{grid-template-columns:1fr}
  .cta{padding:32px 20px}
  .toolbar{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>
<div class="aurora" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="wrap">

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-logo-pulse"></div>
      友链交换站
    </div>
    <div class="nav-acts">
      <a href="https://github.com/nieshilin/FRIEND-LINKS" target="_blank" rel="noopener"
         class="nav-btn" title="GitHub 仓库">

        </svg>
      </a>
      <button class="nav-btn" id="themeBtn" title="切换主题">
        <svg id="iSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

    <div class="sk-wrap"><div style="display:flex;gap:13px;margin-bottom:14px"><div class="sk" style="width:46px;height:46px;border-radius:12px;flex-shrink:0"></div><div style="flex:1"><div class="sk" style="height:13px;width:45%;margin-bottom:7px;border-radius:4px"></div><div class="sk" style="height:10px;width:80%;border-radius:4px"></div></div></div><div class="sk" style="height:10px;border-radius:4px;margin-bottom:5px"></div><div class="sk" style="height:10px;width:75%;border-radius:4px"></div></div>

  <!-- CTA -->
  <div class="cta">

<!-- Detail Modal -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="站点详情">
  <div class="modal" id="modal">
    <!-- Banner：头像居中嵌在 banner 内，完全可见 -->
    <div class="modal-banner" id="modalBanner">
      <div class="modal-avatar" id="modalAvatar"></div>
    </div>
    <button class="modal-close" id="modalClose" aria-label="关闭">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="modal-body">
      <!-- 头像缩略图 + 链接行 -->
      <div class="modal-avatar-row">
        <div class="modal-avatar-thumb" id="modalAvatarThumb"></div>
        <div class="modal-avatar-link-wrap">
          <span class="modal-avatar-link-label">头像链接</span>
          <span class="modal-avatar-link" id="modalAvatarLink"></span>
          <button class="modal-copy-avatar" id="modalCopyAvatar" title="复制头像链接">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-url" id="modalUrl"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-actions">
        <button class="mba mba-ghost" id="modalCopy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          复制链接
        </button>
        <a class="mba mba-primary" id="modalVisit" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          访问站点
        </a>
      </div>
    </div>
  </div>
</div>

<script>
/* ── THEME ── */
const root = document.documentElement;
const tBtn = document.getElementById('themeBtn');
const iSun  = document.getElementById('iSun');
const iMoon = document.getElementById('iMoon');
const saved = localStorage.getItem('fl_theme') ||
  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
applyTheme(saved);
tBtn.addEventListener('click', () =>
  applyTheme(root.dataset.theme === 'dark' ? 'light' : 'dark'));
function applyTheme(t) {
  root.dataset.theme = t;
  localStorage.setItem('fl_theme', t);
  iSun.style.display  = t === 'dark' ? 'block' : 'none';
  iMoon.style.display = t === 'dark' ? 'none'  : 'block';
}

/* ── STATE ── */
let all = [], cats = [], activeCat = 'all', q = '';

const grid     = document.getElementById('grid');
const catsEl   = document.getElementById('cats');
const searchEl = document.getElementById('search');
const countBar = document.getElementById('countBar');

/* ── FETCH ── */
fetch('links.json')
  .then(r => { if (!r.ok) throw new Error('无法加载 links.json'); return r.json(); })
  .then(data => {
    all  = data.links || [];
    cats = data.categories || [];

    /* stats — computed from real data */
    document.getElementById('sSites').textContent  = all.length;
    document.getElementById('sCats').textContent   = cats.length;
    // 自动显示当前日期
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    document.getElementById('sUpdate').textContent = `${y}-${m}-${d}`;

    /* category buttons */
    const allBtn = mkCatBtn({ id: 'all', label: '全部', icon: '🔗' }, true);
    catsEl.appendChild(allBtn);
    cats.forEach(c => catsEl.appendChild(mkCatBtn(c, false)));

    render();
  })
  .catch(err => {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(err.message)}</p></div>`;
  });

function mkCatBtn(c, active) {
  const b = document.createElement('button');
  b.className = 'cat-btn' + (active ? ' active' : '');
  b.dataset.cat = c.id;
  b.innerHTML = `<span class="cat-icon">${c.icon || ''}</span>${esc(c.label)}`;
  b.addEventListener('click', () => switchCat(c.id));
  return b;
}

function switchCat(id) {
  activeCat = id;
  catsEl.querySelectorAll('.cat-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.cat === id));
  render();
}

searchEl.addEventListener('input', () => { q = searchEl.value.trim().toLowerCase(); render(); });

/* ── RENDER ── */
function render() {
  const filtered = all.filter(l => {
    const catOk = activeCat === 'all' || l.category === activeCat;
    const qOk   = !q ||
      l.name.toLowerCase().includes(q) ||
      (l.description || '').toLowerCase().includes(q);
    return catOk && qOk;
  });

  countBar.innerHTML = `共 <strong>${filtered.length}</strong> 个站点`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>没有找到匹配的站点</p></div>`;
    return;
  }

  grid.innerHTML = '';
  filtered.forEach((l, i) => grid.appendChild(buildCard(l, i)));
}

/* ── BUILD CARD ── */
function buildCard(l, i) {
  const color = l.color || '#7c6cf7';
  const catInfo = cats.find(c => c.id === l.category);

  const d = document.createElement('div');
  d.className = 'card';
  d.style.cssText =
    `--card-color:${color};--card-grad:linear-gradient(135deg,${color}0f,transparent 55%);animation-delay:${i * 50}ms`;

  const av = l.avatar
    ? `<img src="${esc(l.avatar)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='🌐'">`
    : '🌐';

  const catTag = catInfo
    ? `<span class="cat-tag">${catInfo.icon || ''} ${esc(catInfo.label)}</span>` : '';

  d.innerHTML = `
    <div class="card-accent"></div>
    <div class="card-inner">
      <div class="avatar">${av}<div class="avatar-ring"></div></div>
      <div class="info">
        <div class="info-name">
          ${esc(l.name)}
          <svg class="info-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M7 17L17 7M17 7H7M17 7v10"/>
          </svg>
        </div>
        <div class="info-url">${esc(l.url)}</div>
        ${l.description ? `<div class="info-desc">${esc(l.description)}</div>` : ''}
      </div>
    </div>
    ${catTag ? `<div class="card-foot">${catTag}</div>` : ''}
  `;

  d.addEventListener('click', () => openModal(l));
  return d;
}

/* ── MODAL ── */
const overlay    = document.getElementById('overlay');
const modalClose = document.getElementById('modalClose');
const modalCopy  = document.getElementById('modalCopy');
const modalVisit = document.getElementById('modalVisit');

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function openModal(l) {
  const color   = l.color || '#7c6cf7';
  const catInfo = cats.find(c => c.id === l.category);

  /* ── Banner 背景
     逻辑：bg 字段（图片或渐变）> 站点 og-image 自动抓取 > 纯色渐变
     bg 字段示例：
       "https://example.com/bg.jpg" → 图片 URL（推荐）
       "url('https://...')"         → CSS url() 语法
       "linear-gradient(...)"       → 自定义渐变
       "#ff6b6b"                    → 纯色
  */
  const bannerEl = document.getElementById('modalBanner');
  bannerEl.style.backgroundImage = '';
  bannerEl.innerHTML = ''; // 清空之前的 img

  let bgUrl = '';

  if (l.bg) {
    const bg = l.bg.trim();
    // 纯 URL（http/https 开头）
    if (/^https?:\/\//i.test(bg)) {
      bgUrl = bg;
    }
    // CSS url() 语法
    else if (/^url\(/i.test(bg)) {
      bgUrl = bg.replace(/^url\(['"]?/i,'').replace(/['"]?\)$/,'');
    }
    // 纯色
    else if (/^#|^rgb/.test(bg)) {
      bannerEl.style.background = `linear-gradient(135deg, ${bg} 0%, ${bg}99 100%)`;
    }
    // CSS 渐变或其他
    else {
      bannerEl.style.background = bg;
    }
  }

  if (!bgUrl) {
    // 无 bg 字段 → 尝试自动抓取站点背景图
    const origin = (() => { try { return new URL(l.url).origin; } catch { return ''; } })();
    if (origin) {
      bgUrl = `${origin}/og-image.jpg`;
    }
  }

  if (bgUrl) {
    // 用 <img> 标签显示，自适应居中
    const img = document.createElement('img');
    img.src = bgUrl;
    img.className = 'modal-banner-img';
    img.onerror = () => {
      console.warn('[友链] 背景图加载失败:', bgUrl);
      bannerEl.innerHTML = '';
      bannerEl.style.background = `linear-gradient(135deg, ${color}dd 0%, ${color}55 50%, ${color}22 100%)`;
    };
    bannerEl.appendChild(img);
  }

  /* ── 头像 & 头像链接
     优先使用 avatar 字段；无头像时用站点 favicon 降级
  */
  const origin = (() => { try { return new URL(l.url).origin; } catch { return ''; } })();
  const faviconUrl = origin ? `${origin}/favicon.ico` : '';

  let resolvedAvatar = l.avatar || faviconUrl || '';
  let displayAvatar  = resolvedAvatar;

  // Banner 内大头像
  const avEl = document.getElementById('modalAvatar') || document.querySelector('#modalAvatar');
  if (avEl) {
    if (displayAvatar) {
      avEl.innerHTML = `<img src="${esc(displayAvatar)}" alt=""
        onerror="this.parentElement.innerHTML='🌐'">`;
    } else {
      avEl.innerHTML = '🌐';
    }
  }

  // 头像链接行：缩略图 + 链接 + 复制按钮
  const thumbEl = document.getElementById('modalAvatarThumb') || document.querySelector('#modalAvatarThumb');
  const linkEl  = document.getElementById('modalAvatarLink') || document.querySelector('#modalAvatarLink');
  if (thumbEl) {
    if (displayAvatar) {
      thumbEl.innerHTML = `<img src="${esc(displayAvatar)}" alt=""
        onerror="this.parentElement.innerHTML='🌐'">`;
      if (linkEl) linkEl.textContent = displayAvatar;
    } else {
      thumbEl.innerHTML = '🌐';
      if (linkEl) linkEl.textContent = '（无头像链接）';
    }
  }

  // 复制头像链接
  const caBtn = document.getElementById('modalCopyAvatar') || document.querySelector('#modalCopyAvatar');
  if (caBtn) {
    caBtn.onclick = () => {
      if (!resolvedAvatar) return;
      navigator.clipboard?.writeText(resolvedAvatar).then(() => {
        caBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>`;
        caBtn.style.color = 'var(--accent)';
        setTimeout(() => {
          caBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
          caBtn.style.color = '';
        }, 2000);
      });
    };
  }

  /* ── 文字信息 */
  const nameEl = document.getElementById('modalName') || document.querySelector('#modalName');
  const urlEl  = document.getElementById('modalUrl')  || document.querySelector('#modalUrl');
  const descEl = document.getElementById('modalDesc') || document.querySelector('#modalDesc');
  const metaEl = document.getElementById('modalMeta') || document.querySelector('#modalMeta');
  if (nameEl) nameEl.textContent = l.name;
  if (urlEl) urlEl.innerHTML = `<span class="modal-url-icon">🔗</span>${esc(l.url)}`;
  if (descEl) descEl.textContent = l.description || '暂无简介';
  if (metaEl) metaEl.innerHTML = catInfo
    ? `<span class="modal-cat">${catInfo.icon || ''} ${esc(catInfo.label)}</span>` : '';

  if (modalVisit) modalVisit.href = l.url;

  /* ── 复制站点链接 */
  const copyOrig = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制链接`;
  const copyOk   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
  if (modalCopy) {
    modalCopy.innerHTML = copyOrig;
    modalCopy.onclick = () => {
      navigator.clipboard?.writeText(l.url).then(() => {
        modalCopy.innerHTML = copyOk;
        setTimeout(() => { modalCopy.innerHTML = copyOrig; }, 2000);
      });
    };
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

/* ── UTIL ── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
